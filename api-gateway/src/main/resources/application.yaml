server:
  port: 8080 # Cửa chính của hệ thống

spring:
  application:
    name: api-gateway

  # Cấu hình kết nối Redis (trong Docker)
  data:
    redis:
      host: localhost
      port: 6379

mypay:
  services:
    identity-uri: http://localhost:8081
    customer-uri: http://localhost:8082
    loan-uri: http://localhost:8083
    notification-uri: http://localhost:8084

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    reactor.netty.http.client: DEBUG